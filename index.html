<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provie</title>
    <link rel="stylesheet" href="css/index.css">
</head>

<body style="background-image: url(background.png); background-size: cover;">
    <nav>
        <a href="#" class="logo">PROVIE</a>

        <ul class="nav-links">
            <li><a href="#">Trang chủ</a></li>
            <li><a href="#">Phim bộ</a></li>
            <li><a href="#">Phim lẻ</a></li>
            <li><a href="#">Mới nhất</a></li>
        </ul>

        <div style="display: flex; gap: 15px; align-items: center;">
            <span style="color: rgba(255,255,255,0.5); font-size: 14px;">Hi, User!</span>
            <button class="nav-btn">VIP</button>
        </div>
    </nav>

    <div id="main">
        <button id="VolSliderToggleBtn" style="position: fixed; right: 2%; bottom: 2%; z-index: 999; width: 36px; aspect-ratio: 1/1; border-radius: 999px; background-color: rgb(255, 255, 255); border: none; cursor: pointer;"><img style="width: 24px; aspect-ratio: 1/1;" src="volume-icon.png" alt=""></button>
        <div style="display: flex; flex-wrap: wrap; align-items: flex-start; gap: 20px; margin-top: 20px; width: 100%;">

            <div class="video-wrapper">
                <div id="next-ep-popup">Tập tiếp theo sau <span id="countdown">10</span>s</div>

                <video id="video" controls style="width: 100%; height: auto; display: block;"></video>

                <div class="volume-container hidden">
                    <span style="color: white; font-size: 14px; opacity: 0.8;">🔊 Boost</span>
                    <input type="range" min="1" max="10" step="0.1" value="5"
                        oninput="boostAudio(this.value); document.getElementById('vol-val').innerText = this.value + 'x'">
                    <span id="vol-val">5x</span>
                </div>
            </div>

            <div style="flex: 2; min-width: 250px;">
                <div class="custom-select" id="customSelect">
                    <div class="select-trigger"><span>Chọn phần phim</span></div>
                    <div class="options">
                        <div class="option" data-value="1">Phần 1: Thập Đại Sát Thủ</div>
                        <div class="option" data-value="2">Phần 2: Ám Sát Lệnh</div>
                        <div class="option" data-value="3">Phần 3: Huyền Vũ Quốc</div>
                        <div class="option" data-value="4">Phần 4: Chân Tướng</div>
                        <div class="option" data-value="5">Phần 5: Bí Mật Sát Thủ</div>
                    </div>
                </div>
                <div id="list-container" class="episode-list"></div>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
    <script>
        var video = document.getElementById('video');
        var hls = new Hls();
        var danhSachPhim = [];
        let currentEpisode = 0;
        var audioContext, source, gainNode;

        // --- 1. Fetch dữ liệu ---
        function fetchListFilm(n, isFirstLoad = false) {
            localStorage.setItem('lastSeason', n);

            // Cập nhật tên phần hiển thị trên Dropbox
            const option = document.querySelector(`.option[data-value="${n}"]`);
            if (option) {
                document.querySelector('.select-trigger span').innerText = option.innerText;
            }

            fetch("ScissorSeven/Seasson" + n + ".json")
                .then(response => response.json())
                .then(data => {
                    danhSachPhim = data;
                    renderList();

                    if (isFirstLoad) {
                        var savedEpisode = localStorage.getItem('lastEpisode');
                        let indexToLoad = (savedEpisode !== null) ? parseInt(savedEpisode) : 0;
                        if (indexToLoad >= danhSachPhim.length) indexToLoad = 0;
                        doiPhim(indexToLoad);
                    } else {
                        doiPhim(0); // Đổi phần thì tự động phát tập 0
                    }
                })
                .catch(error => console.error("Lỗi tải dữ liệu:", error));
        }

        // --- 2. Render danh sách ---
        function renderList() {
            const container = document.getElementById('list-container');
            if (!container) return;
            container.innerHTML = danhSachPhim.map((item, index) => `
            <div class="episode-card" onclick="doiPhim(${index})" id="ep-${index}">
                <div class="ep-thumb-container">
                    <img src="${item.thumb}" class="ep-thumb">
                    <span class="ep-duration">${item.duration}</span>
                </div>
                <div class="ep-info">
                    <div class="ep-title">${item.title}</div>
                </div>
            </div>
        `).join('');
        }

        // --- 3. Hàm đổi phim ---
        function doiPhim(index) {
            if (!danhSachPhim[index]) return;
            var linkMoi = danhSachPhim[index].url;
            currentEpisode = index;

            document.querySelectorAll('.episode-card').forEach(el => el.classList.remove('active'));
            var activeCard = document.getElementById('ep-' + index);
            if (activeCard) activeCard.classList.add('active');

            localStorage.setItem('lastEpisode', index);

            if (Hls.isSupported()) {
                hls.loadSource(linkMoi);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => { }));
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = linkMoi;
                video.play().catch(() => { });
            }
        }

        // --- 4. Điều khiển Dropbox Custom ---
        document.querySelector('.select-trigger').addEventListener('click', (e) => {
            e.stopPropagation(); // Ngăn sự kiện click bị trôi
            document.getElementById('customSelect').classList.toggle('open');
        });

        // Đóng dropbox khi bấm ra ngoài
        window.addEventListener('click', () => {
            document.getElementById('customSelect').classList.remove('open');
        });

        // Sự kiện click vào từng Option
        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', function () {
                const val = this.getAttribute('data-value');
                fetchListFilm(val);
            });
        });

        // --- 5. Khởi tạo ---
        window.addEventListener('DOMContentLoaded', function () {
            var savedVol = localStorage.getItem('lastVol');
            if (savedVol) boostAudio(savedVol);

            var savedSeason = localStorage.getItem('lastSeason');
            fetchListFilm(savedSeason !== null ? savedSeason : 1, true);
        });

        // Các hàm phụ (Audio Boost, Ended, Ambilight) giữ nguyên của bạn...
        function boostAudio(level) {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                source = audioContext.createMediaElementSource(video);
                gainNode = audioContext.createGain();
                source.connect(gainNode);
                gainNode.connect(audioContext.destination);
            }
            gainNode.gain.value = parseFloat(level) || 1;
            localStorage.setItem('lastVol', level);
        }

        video.addEventListener('ended', () => {
            if (currentEpisode < danhSachPhim.length - 1) doiPhim(currentEpisode + 1);
        });

        const volSliderToggleBtn = document.getElementById("VolSliderToggleBtn");
        const volSlider = document.querySelector(".volume-container");
        volSliderToggleBtn.addEventListener("click", () => {
            volSlider.classList.toggle("hidden");
        })
    </script>

</body>


</html>
